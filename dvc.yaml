stages:
  init_db:
    desc: "Enroll speakers from VoxCeleb1/2 into the speaker database"
    cmd: python -m scripts.init_database
    deps:
      - config.yaml
      - scripts/init_database.py
      - src/config.py
      - src/database.py
      - src/embeddings.py
      - src/enrollment.py
      - src/preprocessing.py
      - src/utils.py
      - data/input/VoxCeleb1_test
      - data/input/VoxCeleb2_test

  calibrate:
    desc: "Task 0 – calibrate cosine similarity threshold on unenrolled speakers"
    cmd: python -m benchmarks.run_benchmarks --tasks 0
    deps:
      - config.yaml
      - benchmarks/dataset.py
      - benchmarks/metrics.py
      - benchmarks/run_benchmarks.py
      - src/config.py
      - src/database.py
      - src/embeddings.py
      - src/preprocessing.py
      - src/utils.py
      - data/speaker_db.json
      - data/input/VoxCeleb1_test
      - data/input/VoxCeleb2_test
    outs:
      - data/calibrated_threshold.json

  benchmark:
    desc: "Run evaluation tasks 1-7 on enrolled speakers with excluded enrollment videos"
    cmd: python -m benchmarks.run_benchmarks --tasks 1 2 3 4 5 6 7
    deps:
      - config.yaml
      - benchmarks/augmentations.py
      - benchmarks/dataset.py
      - benchmarks/metrics.py
      - benchmarks/run_benchmarks.py
      - src/config.py
      - src/database.py
      - src/embeddings.py
      - src/preprocessing.py
      - src/utils.py
      - data/speaker_db.json
      - data/calibrated_threshold.json
      - data/input/VoxCeleb1_test
      - data/input/VoxCeleb2_test
    outs:
      - reports/
